<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coronel Assis — Contato Oficial</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold:     #C9A84C;
      --gold-lt:  #E8C96A;
      --dark:     #0B0D12;
      --panel:    #13161E;
      --border:   rgba(201,168,76,0.25);
      --text:     #EAE6DC;
      --muted:    #8A8070;
      --green-br: #009C3B;
      --wa:       #25D366;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 90%, rgba(0,156,59,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Thin top bar in BR green */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--green-br), var(--gold), var(--green-br));
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 28px 32px;
      position: relative;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.1);
    }

    /* Corner ornaments */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.4;
    }
    .card::before { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

    /* Flag stripe accent */
    .accent-line {
      height: 2px;
      background: linear-gradient(90deg, var(--green-br) 0%, var(--gold) 50%, var(--green-br) 100%);
      border-radius: 2px;
      margin-bottom: 28px;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .label::before {
      content: '';
      display: inline-block;
      width: 16px; height: 1px;
      background: var(--gold);
      opacity: 0.6;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.85rem;
      font-weight: 900;
      line-height: 1.1;
      color: #FFFFFF;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    h1 span {
      color: var(--gold);
    }

    .role {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }

    .city-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(201,168,76,0.1);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.78rem;
      color: var(--gold-lt);
      margin-bottom: 28px;
    }
    .city-tag svg { opacity: 0.7; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 24px 0;
    }

    .info-block {
      margin-bottom: 24px;
    }
    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .info-row:last-child { border-bottom: none; }
    .info-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: rgba(201,168,76,0.08);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0.85rem;
    }
    .info-text { font-size: 0.82rem; color: #BEB8AE; line-height: 1.4; }
    .info-text strong { color: var(--text); font-weight: 500; }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      margin-bottom: 10px;
    }
    .btn:active { transform: scale(0.98); }

    .btn-vcart {
      background: linear-gradient(135deg, var(--gold) 0%, #A67C2A 100%);
      color: #0B0D12;
      box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    }
    .btn-vcart:hover { filter: brightness(1.08); box-shadow: 0 6px 28px rgba(201,168,76,0.4); }

    .btn-whatsapp {
      background: linear-gradient(135deg, #1DB954 0%, #128C3A 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(37,211,102,0.2);
    }
    .btn-whatsapp:hover { filter: brightness(1.08); box-shadow: 0 6px 28px rgba(37,211,102,0.3); }

    .btn svg { flex-shrink: 0; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a2110;
      border: 1px solid rgba(29,185,84,0.4);
      color: #6ee7b7;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Step indicator */
    .steps {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .step {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .step-num {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      font-weight: 600;
      flex-shrink: 0;
      color: var(--gold);
      border-color: var(--gold);
      opacity: 0.7;
    }

    .footer-note {
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 20px;
      line-height: 1.6;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }

  </style>
</head>
<body>
  <div class="topbar"></div>

  <div class="card">
    <div class="accent-line"></div>

    <div class="label">Deputado Federal · Mato Grosso</div>
    <h1>Coronel<br><span>Assis</span></h1>
    <div class="role">Contato Oficial do Gabinete</div>

    <div class="city-tag" id="cityTag">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      <span id="cityName">Agenda Presencial</span>
    </div>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <span>Salve o contato</span>
      </div>
      <div style="display:flex;align-items:center;color:#2d3748;font-size:0.8rem;">→</div>
      <div class="step">
        <div class="step-num">2</div>
        <span>Abra o WhatsApp</span>
      </div>
    </div>

    <button class="btn btn-vcart" id="btnVcard" onclick="downloadVcard()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Salvar contato na agenda
    </button>

    <a class="btn btn-whatsapp" id="btnWhatsapp" href="#" onclick="openWhatsapp(); return false;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
      </svg>
      Falar no WhatsApp
    </a>

    <div class="footer-note">
      Ao entrar em contato, você concorda em receber<br>
      informações sobre o trabalho do Deputado.
    </div>
  </div>

  <div class="toast" id="toast">✓ Contato salvo! Agora abra o WhatsApp</div>

  <script>
    // --- Lê parâmetros da URL ---
    const params = new URLSearchParams(window.location.search);
    const cidade  = params.get('cidade')  || '';
    const evento  = params.get('evento')  || '';

    // Exibe a cidade na tag
    if (cidade) {
      document.getElementById('cityName').textContent = cidade;
    } else if (evento) {
      document.getElementById('cityName').textContent = evento;
    }

    // --- Monta o texto pré-preenchido do WhatsApp ---
    function buildWaText() {
      if (cidade) {
        return `Olá! Participei da agenda do Coronel Assis em ${cidade} e gostaria de acompanhar o trabalho dele.`;
      } else if (evento) {
        return `Olá! Participei do evento "${evento}" com o Coronel Assis e gostaria de acompanhar o trabalho dele.`;
      } else {
        return `Olá! Escanei o QR Code do Coronel Assis e gostaria de acompanhar o trabalho dele.`;
      }
    }

    function openWhatsapp() {
      const text = encodeURIComponent(buildWaText());
      const number = '5565981099168';
      window.open(`https://wa.me/${number}?text=${text}`, '_blank');
    }

    // --- Gera e baixa o vCard ---
    function downloadVcard() {
      const vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Coronel Assis - Contato Oficial',
        'N:Assis;Coronel;;;',
        'ORG:Gabinete Coronel Assis - Deputado Federal MT',
        'TEL;TYPE=CELL,PREF:+5565981099168',
        'NOTE:Deputado Federal por Mato Grosso',
        'END:VCARD'
      ].join('\n');

      const blob = new Blob([vcard], { type: 'text/vcard' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'CoronelAssis.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      // Toast feedback
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
